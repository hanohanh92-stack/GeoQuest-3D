<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - TP 2: Arsitek Ruang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    <div class="w-full h-[45vh] md:h-auto md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <span id="view-label" class="bg-sky-500 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-lg uppercase tracking-wider">TP 2: Memuat...</span>
        </div>
        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-3 z-10">
            <button id="btn-xray" onclick="toggleXRay()" class="bg-slate-800/80 hover:bg-sky-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg transition flex items-center gap-2 backdrop-blur-sm hidden">🔍 Sinar-X</button>
            <button id="btn-explode" onclick="toggleExplode()" class="bg-slate-800/80 hover:bg-sky-500 text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg transition flex items-center gap-2 backdrop-blur-sm hidden">💥 Bongkar</button>
        </div>
    </div>
    <div class="w-full md:w-96 flex flex-col gap-4">
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-sky-500 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-sky-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white flex-shrink-0">
                    <span class="text-2xl">👩‍🏫</span>
                </div>
                <div>
                    <h2 class="font-bold text-slate-800 uppercase tracking-tight">Ibu Guru</h2>
                    <p class="text-[10px] text-sky-600 font-bold uppercase">Asisten GeoQuest</p>
                </div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm leading-relaxed font-medium italic overflow-y-auto max-h-32 transition-all">
                "Halo, Arsitek cilik. Mari kita hitung jumlah kubus tersembunyi."
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4 flex flex-col">
            <h3 class="font-bold text-slate-800 text-center text-sm" id="question-text">ADA BERAPA TOTAL KUBUS PENYUSUN BANGUN INI?</h3>
            <div id="options-container" class="grid grid-cols-3 gap-3 min-h-[60px]"></div>
            <button id="next-btn" onclick="nextLevel()" class="w-full py-3 bg-sky-500 text-white rounded-xl font-bold text-xs hover:bg-sky-600 transition-all hidden">SOAL BERIKUTNYA</button>
        </div>
    </div>
    <script>
        let scene, camera, renderer, group;
        let isXRayOn = false; let isExploded = false;
        let cubesData = []; let correctCount = 0;
        window.speechUtterances = []; 
        function speak(text, callback = null) {
            window.speechSynthesis.cancel(); 
            let utterance = new SpeechSynthesisUtterance(text);
            window.speechUtterances.push(utterance); 
            utterance.lang = 'id-ID'; utterance.pitch = 1.3; utterance.rate = 0.85; 
            utterance.onend = function() { if(callback) callback(); };
            window.speechSynthesis.speak(utterance);
            document.getElementById('chat-bubble').innerText = '"' + text + '"';
        }
        function generateCluster() {
            let positions = [];
            let baseW = Math.floor(Math.random() * 2) + 2; 
            let baseD = Math.floor(Math.random() * 2) + 2; 
            for(let x = 0; x < baseW; x++) { for(let z = 0; z < baseD; z++) { positions.push({x: x, y: 0, z: z}); } }
            let topCubes = Math.floor(Math.random() * 3) + 2; 
            for(let i = 0; i < topCubes; i++) {
                let tx = Math.floor(Math.random() * baseW);
                let tz = Math.floor(Math.random() * baseD);
                if (!positions.some(p => p.x === tx && p.y === 1 && p.z === tz)) { positions.push({x: tx, y: 1, z: tz}); }
            }
            return positions;
        }
        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(6, 5, 8); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(10, 20, 15); scene.add(light);
            group = new THREE.Group(); scene.add(group);
            buildLevel(); animate();
            window.addEventListener('resize', onWindowResize);
        }
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        function buildLevel() {
            group.clear(); cubesData = []; isXRayOn = false; isExploded = false;
            document.getElementById('view-label').innerText = "TP 2: Tebak Jumlah Kubus";
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('btn-xray').classList.add('hidden');
            document.getElementById('btn-explode').classList.add('hidden');
            let posArray = generateCluster();
            correctCount = posArray.length;
            const colors = [0x0ea5e9, 0xf59e0b, 0x8b5cf6, 0x10b981];
            const matColor = colors[Math.floor(Math.random() * colors.length)];
            const material = new THREE.MeshLambertMaterial({ color: matColor, transparent: true, opacity: 1, depthWrite: true });
            posArray.forEach(p => {
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material.clone());
                const edges = new THREE.LineSegments(new THREE.EdgesGeometry(cube.geometry), new THREE.LineBasicMaterial({ color: 0x0f172a, linewidth: 2 }));
                cube.add(edges); cube.position.set(p.x, p.y, p.z);
                group.add(cube);
                cubesData.push({ mesh: cube, origX: p.x, origY: p.y, origZ: p.z });
            });
            new THREE.Box3().setFromObject(group).getCenter(group.position).multiplyScalar(-1);
            generateOptions(correctCount);
            speak("Halo, Arsitek cilik! Coba tebak, ada berapa total kubus kecil yang menyusun bangunan ini?");
        }
        function generateOptions(correctAnswer) {
            const container = document.getElementById('options-container');
            container.innerHTML = ''; container.style.pointerEvents = 'auto';
            let options = [correctAnswer];
            let distractors = [correctAnswer - 1, correctAnswer + 1, correctAnswer - 2, correctAnswer + 2].filter(d => d > 0);
            options.push(distractors.splice(Math.floor(Math.random() * distractors.length), 1)[0]);
            options.push(distractors.splice(Math.floor(Math.random() * distractors.length), 1)[0]);
            options.sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = "py-4 border-2 border-slate-200 rounded-xl hover:border-sky-400 transition text-xl font-extrabold text-slate-700 bg-white shadow-sm";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt === correctAnswer);
                container.appendChild(btn);
            });
        }
        function checkAnswer(isCorrect) {
            document.getElementById('options-container').style.pointerEvents = 'none'; 
            document.getElementById('btn-xray').classList.remove('hidden');
            document.getElementById('btn-explode').classList.remove('hidden');
            const text = isCorrect 
                ? `Luar biasa! Jawabanmu tepat sekali, ada ${correctCount} kubus.` 
                : `Sayang sekali, masih kurang tepat. Ayo gunakan alat Sinar-X atau Bongkar untuk menghitungnya.`;
            speak(text, () => { document.getElementById('next-btn').classList.remove('hidden'); });
        }
        function toggleXRay() {
            isXRayOn = !isXRayOn;
            let btn = document.getElementById('btn-xray');
            if (isXRayOn) { btn.classList.add('bg-sky-500'); btn.classList.remove('bg-slate-800/80'); speak("Sinar-X diaktifkan."); } 
            else { btn.classList.remove('bg-sky-500'); btn.classList.add('bg-slate-800/80'); }
            cubesData.forEach(data => { gsap.to(data.mesh.material, { opacity: isXRayOn ? 0.25 : 1, duration: 0.5 }); });
        }
        function toggleExplode() {
            isExploded = !isExploded;
            let btn = document.getElementById('btn-explode');
            if (isExploded) { btn.classList.add('bg-sky-500'); btn.classList.remove('bg-slate-800/80'); speak("Membongkar susunan!"); } 
            else { btn.classList.remove('bg-sky-500'); btn.classList.add('bg-slate-800/80'); speak("Menyusun kembali."); }
            cubesData.forEach(data => {
                let targetX = isExploded ? data.origX * 1.8 : data.origX;
                let targetY = isExploded ? data.origY * 1.8 : data.origY;
                let targetZ = isExploded ? data.origZ * 1.8 : data.origZ;
                gsap.to(data.mesh.position, { x: targetX, y: targetY, z: targetZ, duration: 1, ease: "back.out(1.2)" });
            });
        }
        function nextLevel() { buildLevel(); }
        function animate() { requestAnimationFrame(animate); group.rotation.y += 0.003; renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
