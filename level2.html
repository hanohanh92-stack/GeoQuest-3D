<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - TP 2: Arsitek Ruang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    <div class="w-full h-[45vh] md:h-auto md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <a href="index.html" class="bg-white/90 hover:bg-white text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg transition flex items-center justify-center gap-2 backdrop-blur-sm w-max border border-slate-200">⬅️ Kembali ke Markas</a>
            <span id="view-label" class="bg-sky-500 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-lg uppercase tracking-wider">TP 2: Memuat...</span>
        </div>
        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-3 z-10">
            <button id="btn-xray" onclick="toggleXRay()" class="bg-slate-800/80 hover:bg-sky-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg transition hidden">🔍 Sinar-X</button>
            <button id="btn-explode" onclick="toggleExplode()" class="bg-slate-800/80 hover:bg-sky-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg transition hidden">💥 Bongkar</button>
        </div>
    </div>
    <div class="w-full md:w-96 flex flex-col gap-4">
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-sky-500 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-sky-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white flex-shrink-0"><span class="text-2xl">👩‍🏫</span></div>
                <div><h2 class="font-bold text-slate-800 uppercase tracking-tight">Ibu Guru</h2><p class="text-[10px] text-sky-600 font-bold uppercase">Asisten GeoQuest</p></div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm italic overflow-y-auto max-h-32 transition-all">"Halo, Arsitek cilik. Mari kita hitung jumlah kubus tersembunyi."</div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4 flex flex-col">
            <h3 class="font-bold text-slate-800 text-center text-xs" id="question-text">ADA BERAPA TOTAL KUBUS PENYUSUN BANGUN INI?</h3>
            <div id="options-container" class="grid grid-cols-3 gap-3 min-h-[60px]"></div>
            <button id="next-btn" onclick="nextLevel()" class="w-full py-3 bg-sky-500 text-white rounded-xl font-bold text-xs hidden">SOAL BERIKUTNYA</button>
        </div>
    </div>
    <script>

        // --- SISTEM PENGIRIMAN DATA (TELEMETRI) ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzh2BuLexfDG2v_yGvYuYFK_QjRROZN6qzieW0XrGaW1q5pX9k889J4vw4ktH16Y27tmA/exec";
        
        function sendEvaluasiData(tpName, soalName, status, alatBantu = "Tanpa Alat") {
            const studentName = localStorage.getItem('geoquest_student_name') || "Anonim";
            
            const payload = {
                nama: studentName,
                tp: tpName,
                soal: soalName,
                status: status,
                alatBantu: alatBantu
            };

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log("Data terekam: ", payload);
            }).catch(err => {
                console.error("Gagal mengirim data:", err);
            });
        }

        let scene, camera, renderer, group;
        let isXRayOn = false; let isExploded = false; let cubesData = []; let correctCount = 0; window.speechUtterances = []; 
        function speak(text, callback = null) {
            window.speechSynthesis.cancel(); let utterance = new SpeechSynthesisUtterance(text); window.speechUtterances.push(utterance); 
            utterance.lang = 'id-ID'; utterance.pitch = 1.3; utterance.rate = 0.85; utterance.onend = function() { if(callback) callback(); };
            window.speechSynthesis.speak(utterance); document.getElementById('chat-bubble').innerText = '"' + text + '"';
        }
        function generateCluster() {
            let positions = []; let baseW = Math.floor(Math.random() * 2) + 2; let baseD = Math.floor(Math.random() * 2) + 2; 
            for(let x = 0; x < baseW; x++) { for(let z = 0; z < baseD; z++) { positions.push({x: x, y: 0, z: z}); } }
            let topCubes = Math.floor(Math.random() * 3) + 2; 
            for(let i = 0; i < topCubes; i++) {
                let tx = Math.floor(Math.random() * baseW); let tz = Math.floor(Math.random() * baseD);
                if (!positions.some(p => p.x === tx && p.y === 1 && p.z === tz)) { positions.push({x: tx, y: 1, z: tz}); }
            }
            return positions;
        }
        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(6, 5, 8); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(container.clientWidth, container.clientHeight); container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8)); const light = new THREE.DirectionalLight(0xffffff, 0.5); light.position.set(10, 20, 15); scene.add(light);
            group = new THREE.Group(); scene.add(group); buildLevel(); animate();
            window.addEventListener('resize', () => { camera.aspect = container.clientWidth/container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });
        }
        function buildLevel() {
            group.clear(); cubesData = []; isXRayOn = false; isExploded = false;
            document.getElementById('view-label').innerText = "TP 2: Arsitek Ruang";
            document.getElementById('next-btn').classList.add('hidden'); document.getElementById('btn-xray').classList.add('hidden'); document.getElementById('btn-explode').classList.add('hidden');
            let posArray = generateCluster(); correctCount = posArray.length;
            const colors = [0x0ea5e9, 0xf59e0b, 0x8b5cf6, 0x10b981]; const matColor = colors[Math.floor(Math.random() * colors.length)];
            const material = new THREE.MeshLambertMaterial({ color: matColor, transparent: true, opacity: 1, depthWrite: true });
            posArray.forEach(p => {
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material.clone());
                cube.add(new THREE.LineSegments(new THREE.EdgesGeometry(cube.geometry), new THREE.LineBasicMaterial({ color: 0x0f172a })));
                cube.position.set(p.x, p.y, p.z); group.add(cube); cubesData.push({ mesh: cube, origX: p.x, origY: p.y, origZ: p.z });
            });
            new THREE.Box3().setFromObject(group).getCenter(group.position).multiplyScalar(-1);
            generateOptions(correctCount); speak("Ada berapa total kubus kecil penyusun bangun ini?");
        }
        function generateOptions(correctAnswer) {
            const container = document.getElementById('options-container'); container.innerHTML = '';
            let opts = [correctAnswer]; let dists = [correctAnswer - 1, correctAnswer + 1, correctAnswer - 2, correctAnswer + 2].filter(d => d > 0);
            opts.push(dists.splice(Math.floor(Math.random() * dists.length), 1)[0]); opts.push(dists.splice(Math.floor(Math.random() * dists.length), 1)[0]);
            opts.sort(() => Math.random() - 0.5);
            opts.forEach(opt => {
                let btn = document.createElement('button'); btn.className = "py-4 border-2 rounded-xl bg-white font-extrabold text-slate-700";
                btn.innerText = opt; btn.onclick = () => checkAnswer(opt === correctAnswer); container.appendChild(btn);
            });
        }
        function checkAnswer(isCorrect) {
            document.getElementById('options-container').style.pointerEvents = 'none'; 
            document.getElementById('btn-xray').classList.remove('hidden'); document.getElementById('btn-explode').classList.remove('hidden');
            sendEvaluasiData("TP 2: Arsitek Ruang", "Tebak Jumlah", isCorrect ? "Benar" : "Salah");
            speak(isCorrect ? `Tepat! Ada ${correctCount} kubus.` : `Gunakan alat Sinar-X atau Bongkar untuk menghitungnya.`, () => { document.getElementById('next-btn').classList.remove('hidden'); });
        }
        function toggleXRay() {
            isXRayOn = !isXRayOn; let btn = document.getElementById('btn-xray');
            if (isXRayOn) { btn.classList.add('bg-sky-500'); speak("Sinar-X diaktifkan."); sendEvaluasiData("TP 2", "Tebak Jumlah", "Info", "Sinar-X"); } 
            else { btn.classList.remove('bg-sky-500'); }
            cubesData.forEach(data => { gsap.to(data.mesh.material, { opacity: isXRayOn ? 0.25 : 1, duration: 0.5 }); });
        }
        function toggleExplode() {
            isExploded = !isExploded; let btn = document.getElementById('btn-explode');
            if (isExploded) { btn.classList.add('bg-sky-500'); speak("Membongkar!"); sendEvaluasiData("TP 2", "Tebak Jumlah", "Info", "Bongkar"); } 
            else { btn.classList.remove('bg-sky-500'); speak("Menyusun."); }
            cubesData.forEach(data => {
                let tX = isExploded ? data.origX * 1.8 : data.origX; let tY = isExploded ? data.origY * 1.8 : data.origY; let tZ = isExploded ? data.origZ * 1.8 : data.origZ;
                gsap.to(data.mesh.position, { x: tX, y: tY, z: tZ, duration: 1, ease: "back.out(1.2)" });
            });
        }
        function nextLevel() { buildLevel(); document.getElementById('options-container').style.pointerEvents = 'auto'; }
        function animate() { requestAnimationFrame(animate); group.rotation.y += 0.003; renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
