<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - TP 3: Sang Fotografer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    <div class="w-full h-[45vh] md:h-auto md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <a href="index.html" class="bg-white/90 hover:bg-white text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg transition flex items-center justify-center gap-2 backdrop-blur-sm w-max border border-slate-200">⬅️ Kembali ke Markas</a>
            <span id="view-label" class="bg-teal-500 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-lg uppercase tracking-wider">Pandangan: Perspektif</span>
        </div>
    </div>
    <div class="w-full md:w-96 flex flex-col gap-4">
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-teal-500 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-teal-600 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white flex-shrink-0"><span class="text-2xl">👩‍🏫</span></div>
                <div><h2 class="font-bold text-slate-800 uppercase tracking-tight">Ibu Guru</h2><p class="text-[10px] text-teal-600 font-bold uppercase">Asisten GeoQuest</p></div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm leading-relaxed font-medium italic overflow-y-auto max-h-32 transition-all">"Halo, Nak. Mari kita asah imajinasi spasialmu."</div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <h3 class="font-bold text-slate-800 text-center text-sm">MANA TAMPAK ATAS YANG TEPAT?</h3>
            <div id="options-container" class="grid grid-cols-2 gap-3 min-h-[120px]"></div>
            <button id="reset-btn" onclick="nextLevel()" class="w-full py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs hover:bg-teal-500 hover:text-white transition-all hidden">TANTANGAN BERIKUTNYA</button>
        </div>
    </div>
    <script>

        // --- SISTEM PENGIRIMAN DATA (TELEMETRI) ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzh2BuLexfDG2v_yGvYuYFK_QjRROZN6qzieW0XrGaW1q5pX9k889J4vw4ktH16Y27tmA/exec";
        
        function sendEvaluasiData(tpName, soalName, status, alatBantu = "Tanpa Alat") {
            const studentName = localStorage.getItem('geoquest_student_name') || "Anonim";
            
            const payload = {
                nama: studentName,
                tp: tpName,
                soal: soalName,
                status: status,
                alatBantu: alatBantu
            };

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors', // Penting untuk bypass blokir CORS browser
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log("Data terekam: ", payload);
            }).catch(err => {
                console.error("Gagal mengirim data:", err);
            });
        }

        let scene, camera, renderer, group;
        let isCorrect = false; let currentChallengeData = null;
        window.speechUtterances = []; 
        function speak(text, callback = null) {
            window.speechSynthesis.cancel(); let utterance = new SpeechSynthesisUtterance(text); window.speechUtterances.push(utterance); 
            utterance.lang = 'id-ID'; utterance.pitch = 1.3; utterance.rate = 0.85; 
            utterance.onend = function() { if(callback) callback(); }; window.speechSynthesis.speak(utterance);
            document.getElementById('chat-bubble').innerText = '"' + text + '"';
        }
        function generateDynamicChallenge() {
            let positions = []; let baseGrid = new Set(); baseGrid.add('0,0');
            let numBaseBlocks = Math.floor(Math.random() * 5) + 4; let dirs = [{x:1,z:0}, {x:-1,z:0}, {x:0,z:1}, {x:0,z:-1}];
            for (let i = 1; i < numBaseBlocks; i++) {
                let existingBlocks = Array.from(baseGrid); let anchor = existingBlocks[Math.floor(Math.random() * existingBlocks.length)].split(',');
                let dir = dirs[Math.floor(Math.random() * dirs.length)];
                let nx = parseInt(anchor[0]) + dir.x; let nz = parseInt(anchor[1]) + dir.z; baseGrid.add(`${nx},${nz}`);
            }
            let hasStacking = false;
            baseGrid.forEach(coord => {
                let [x, z] = coord.split(',').map(Number); let height = Math.floor(Math.random() * 3) + 1;
                if (height > 1) hasStacking = true;
                for(let y = 0; y < height; y++) { positions.push({x: x, y: y, z: z}); }
            });
            let bounds = {
                minX: Math.min(...Array.from(baseGrid).map(c => parseInt(c.split(',')[0]))), maxX: Math.max(...Array.from(baseGrid).map(c => parseInt(c.split(',')[0]))),
                minZ: Math.min(...Array.from(baseGrid).map(c => parseInt(c.split(',')[1]))), maxZ: Math.max(...Array.from(baseGrid).map(c => parseInt(c.split(',')[1])))
            };
            let cols = bounds.maxX - bounds.minX + 1; let rows = bounds.maxZ - bounds.minZ + 1;
            let shapeName = (baseGrid.size < (cols * rows)) ? "susunan kubus gabungan" : "balok utuh";
            let correctMatrix = Array(rows).fill().map(() => Array(cols).fill(0));
            positions.forEach(p => correctMatrix[p.z - bounds.minZ][p.x - bounds.minX] = 1);
            let wrongMatrix = correctMatrix.map(row => [...row]);
            let rz = Math.floor(Math.random() * rows); let rx = Math.floor(Math.random() * cols);
            wrongMatrix[rz][rx] = wrongMatrix[rz][rx] === 1 ? 0 : 1; 
            if(wrongMatrix.flat().every(v => v === 0)) wrongMatrix[0][0] = 1;
            return { positions, cols, rows, correctMatrix, wrongMatrix, hasStacking, shapeName };
        }
        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(10, 10, 10); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(container.clientWidth, container.clientHeight); container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7)); const light = new THREE.DirectionalLight(0xffffff, 0.6); light.position.set(10, 20, 15); scene.add(light);
            group = new THREE.Group(); scene.add(group); loadLevel(true); animate(); window.addEventListener('resize', onWindowResize);
        }
        function onWindowResize() {
            const container = document.getElementById('canvas-container'); camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        function loadLevel(isFirst = false) {
            group.clear(); currentChallengeData = generateDynamicChallenge();
            const material = new THREE.MeshLambertMaterial({ color: 0x14b8a6 });
            currentChallengeData.positions.forEach(p => {
                const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), material);
                cube.add(new THREE.LineSegments(new THREE.EdgesGeometry(cube.geometry), new THREE.LineBasicMaterial({ color: 0x0f172a, linewidth: 2 })));
                cube.position.set(p.x, p.y, p.z); group.add(cube);
            });
            new THREE.Box3().setFromObject(group).getCenter(group.position).multiplyScalar(-1);
            generateOptions(currentChallengeData); document.getElementById('reset-btn').classList.add('hidden');
            if (isFirst) { setTimeout(() => { speak(`Halo, Nak. Perhatikan ${currentChallengeData.shapeName} ini.`); }, 1000); } 
            else { speak(`Ibu punya ${currentChallengeData.shapeName} yang baru.`); }
        }
        function generateOptions(data) {
            const container = document.getElementById('options-container'); container.innerHTML = ''; const correctPos = Math.random() > 0.5 ? 0 : 1;
            for(let i = 0; i < 2; i++) {
                const isThisCorrect = (i === correctPos); const matrix = isThisCorrect ? data.correctMatrix : data.wrongMatrix;
                const btn = document.createElement('button'); btn.className = "p-4 border-2 border-slate-200 rounded-2xl hover:border-teal-400 transition flex flex-col items-center justify-center gap-3 bg-white shadow-sm w-full h-full";
                btn.onclick = function() { document.getElementById('options-container').style.pointerEvents = 'none'; checkAnswer(isThisCorrect); };
                let gridHTML = `<div style="display: grid; grid-template-columns: repeat(${data.cols}, 1fr); gap: 2px; background: #e2e8f0; padding: 4px; border-radius: 4px; max-width: 80px; width: 100%; aspect-ratio: ${data.cols} / ${data.rows};">`;
                matrix.forEach(row => { row.forEach(cell => { gridHTML += `<div class="${cell === 1 ? 'bg-teal-500 border border-teal-600' : 'bg-transparent'} rounded-sm"></div>`; }); });
                gridHTML += `</div><span class="font-bold text-[10px] text-slate-400 uppercase">Pilihan ${String.fromCharCode(65+i)}</span>`;
                btn.innerHTML = gridHTML; container.appendChild(btn);
            }
        }
        function checkAnswer(correct) {
            isCorrect = correct;
            sendEvaluasiData("TP 3: Sang Fotografer", currentChallengeData.shapeName, correct ? "Benar" : "Salah"); // Kirim Data
            speak(correct ? "Tepat sekali!" : "Ibu hargai usahamu.", function() {
                gsap.to(camera.position, { x: 0, y: 18, z: 0, duration: 2, ease: "power2.inOut", onUpdate: () => camera.lookAt(0, 0, 0), onComplete: showFeedback });
            });
        }
        function showFeedback() {
            document.getElementById('view-label').innerText = "Pandangan: Atas (2D)";
            let text = isCorrect ? "Hebat! Kedalaman menghilang." : "Coba amati polanya.";
            speak(text, () => { document.getElementById('reset-btn').classList.remove('hidden'); });
        }
        function nextLevel() {
            document.getElementById('reset-btn').classList.add('hidden'); document.getElementById('options-container').style.pointerEvents = 'auto';
            gsap.to(camera.position, { x: 10, y: 10, z: 10, duration: 1.5, onUpdate: () => camera.lookAt(0, 0, 0), onComplete: () => { document.getElementById('view-label').innerText = "Pandangan: Perspektif"; loadLevel(false); } });
        }
        function animate() { requestAnimationFrame(animate); if(camera.position.y < 15) group.rotation.y += 0.005; renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
