<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - TP 1: Sang Pelipat Ajaib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    <div class="w-full h-[45vh] md:h-auto md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <a href="index.html" class="bg-white/90 hover:bg-white text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg transition flex items-center justify-center gap-2 backdrop-blur-sm w-max border border-slate-200">⬅️ Kembali ke Markas</a>
            <span id="view-label" class="bg-amber-500 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-lg uppercase tracking-wider">TP 1: Memuat...</span>
        </div>
    </div>
    <div class="w-full md:w-96 flex flex-col gap-4">
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-amber-500 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white flex-shrink-0"><span class="text-2xl">👩‍🏫</span></div>
                <div><h2 class="font-bold text-slate-800 uppercase tracking-tight">Ibu Guru</h2><p class="text-[10px] text-amber-600 font-bold uppercase">Asisten GeoQuest</p></div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm leading-relaxed font-medium italic overflow-y-auto max-h-32 transition-all">"Mari kita latih imajinasi lipatanmu."</div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <h3 class="font-bold text-slate-800 text-center text-sm" id="question-text">MANA YANG AKAN MENJADI TUTUP ATAS?</h3>
            <div id="options-container" class="grid grid-cols-2 gap-3"></div>
            <div class="flex gap-2">
                <button id="reset-fold-btn" onclick="resetFold()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs hidden">BUKA LIPATAN</button>
                <button id="next-btn" onclick="nextLevel()" class="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold text-xs hidden">SOAL LANJUT</button>
            </div>
        </div>
    </div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzh2BuLexfDG2v_yGvYuYFK_QjRROZN6qzieW0XrGaW1q5pX9k889J4vw4ktH16Y27tmA/exec";
        function sendData(tp, soal, status, alat = "Tanpa Alat") {
            const nama = localStorage.getItem('geoquest_student_name') || "Anonim";
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nama, tp, soal, status, alatBantu: alat }) });
        }
        let scene, camera, renderer, group, pivotsToAnimate = [], currentLevelIdx = 0, isCorrectAnswer = false;
        const levelsData = [
            { title: "Kubus (Pola 1-4-1)", type: "Kubus", baseColorName: "Merah Muda", faces: [{id: 0, color: 0xec4899, w:1, h:1, hinge: null, parent: null, foldAxis: '', foldAngle: 0}, {id: 1, color: 0x22c55e, w:1, h:1, hinge: 'left', parent: 0, foldAxis: 'y', foldAngle: Math.PI/2}, {id: 2, color: 0xa855f7, w:1, h:1, hinge: 'right', parent: 0, foldAxis: 'y', foldAngle: -Math.PI/2}, {id: 3, color: 0xeab308, w:1, h:1, hinge: 'top', parent: 0, foldAxis: 'x', foldAngle: Math.PI/2}, {id: 4, color: 0x3b82f6, w:1, h:1, hinge: 'bottom', parent: 0, foldAxis: 'x', foldAngle: -Math.PI/2}, {id: 5, color: 0x06b6d4, w:1, h:1, hinge: 'bottom', parent: 4, foldAxis: 'x', foldAngle: -Math.PI/2}], question: "Jika Merah Muda jadi alas, mana tutup atasnya?", options: [{text: "Sian", isCorrect: true, colorCls: "bg-cyan-500", hexName: "Sian"}, {text: "Kuning", isCorrect: false, colorCls: "bg-yellow-500", hexName: "Kuning"}] }
        ];
        function speak(t, c) { window.speechSynthesis.cancel(); let u = new SpeechSynthesisUtterance(t); u.lang='id-ID'; u.pitch=1.3; u.rate=0.85; u.onend=()=>{if(c)c();}; window.speechSynthesis.speak(u); document.getElementById('chat-bubble').innerText = '"'+t+'"'; }
        function init() { scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9); const c = document.getElementById('canvas-container'); camera = new THREE.PerspectiveCamera(50, c.clientWidth/c.clientHeight, 0.1, 1000); camera.position.set(0, 6, 8); camera.lookAt(0,0,0); renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(c.clientWidth, c.clientHeight); c.appendChild(renderer.domElement); scene.add(new THREE.AmbientLight(0xffffff, 0.8)); let l = new THREE.DirectionalLight(0xffffff, 0.5); l.position.set(5,10,7); scene.add(l); group = new THREE.Group(); scene.add(group); buildLevel(0); animate(); window.addEventListener('resize', onWindowResize); }
        function onWindowResize() { const c = document.getElementById('canvas-container'); camera.aspect = c.clientWidth/c.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(c.clientWidth, c.clientHeight); }
        function buildLevel(idx) { group.clear(); pivotsToAnimate=[]; let d = levelsData[idx]; document.getElementById('view-label').innerText = "TP 1: "+d.title; document.getElementById('question-text').innerText = d.question; document.getElementById('reset-fold-btn').classList.add('hidden'); document.getElementById('next-btn').classList.add('hidden'); let o = document.getElementById('options-container'); o.innerHTML = ''; o.style.pointerEvents = 'auto'; d.options.forEach(opt => { let b = document.createElement('button'); b.className = "p-4 border-2 rounded-2xl bg-white shadow-sm font-bold flex items-center gap-2"; b.innerHTML = `<div class='w-4 h-4 rounded-full ${opt.colorCls}'></div> ${opt.text}`; b.onclick = () => checkAnswer(opt.isCorrect, opt.hexName, d.type, d.baseColorName); o.appendChild(b); }); let objs = {}; d.faces.forEach(f => { const g = new THREE.PlaneGeometry(f.w, f.h); const m = new THREE.MeshLambertMaterial({color:f.color, side:THREE.DoubleSide, transparent:true, opacity:0.95}); const mesh = new THREE.Mesh(g,m); mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(g), new THREE.LineBasicMaterial({color:0x000}))); if(f.parent===null){ mesh.rotation.x = -Math.PI/2; group.add(mesh); objs[f.id]={mesh,data:f}; } else { let p=objs[f.parent]; let piv=new THREE.Group(); if(f.hinge==='left') piv.position.set(-p.data.w/2,0,0); if(f.hinge==='right') piv.position.set(p.data.w/2,0,0); if(f.hinge==='top') piv.position.set(0,p.data.h/2,0); if(f.hinge==='bottom') piv.position.set(0,-p.data.h/2,0); p.mesh.add(piv); if(f.hinge==='left') mesh.position.set(-f.w/2,0,0); if(f.hinge==='right') mesh.position.set(f.w/2,0,0); if(f.hinge==='top') mesh.position.set(0,f.h/2,0); if(f.hinge==='bottom') mesh.position.set(0,-f.h/2,0); piv.add(mesh); objs[f.id]={mesh,data:f}; pivotsToAnimate.push({piv,axis:f.foldAxis,angle:f.foldAngle}); } }); group.position.set(0,0,0); gsap.to(camera.position, {x:0,y:7,z:9}); if(idx===0) setTimeout(()=>speak(d.question),1000); else speak(d.question); }
        function checkAnswer(c, color, type, base) { isCorrectAnswer=c; document.getElementById('options-container').style.pointerEvents='none'; sendData("TP 1", type, c?"Benar":"Salah"); speak(c?"Tepat sekali! Mari kita buktikan.":"Mari kita cek bersama.", ()=>{ pivotsToAnimate.forEach((a,i)=>{ let d=(i===pivotsToAnimate.length-1)?0.5:0; if(a.axis==='x') gsap.to(a.piv.rotation,{x:a.angle, duration:1.5, delay:d}); else gsap.to(a.piv.rotation,{y:a.angle, duration:1.5, delay:d}); }); gsap.to(camera.position, {x:0,y:4,z:10, duration:2, onUpdate:()=>camera.lookAt(0,0.5,0), onComplete:()=>showFeedback(color,type,base)}); }); }
        function showFeedback(c,t,b){ document.getElementById('view-label').innerText = "Wujud 3D: "+t; speak(isCorrectAnswer?`Sisi ${c} benar di atas sisi ${b}.`:`Tutupnya bukan sisi itu.`, ()=>{ document.getElementById('reset-fold-btn').classList.remove('hidden'); document.getElementById('next-btn').classList.remove('hidden'); }); }
        function resetFold(){ document.getElementById('reset-fold-btn').classList.add('hidden'); pivotsToAnimate.forEach(a=>gsap.to(a.piv.rotation,{x:0,y:0,duration:1.5})); gsap.to(camera.position,{x:0,y:7,z:9,duration:1.5,onUpdate:()=>camera.lookAt(0,0,0),onComplete:()=>document.getElementById('options-container').style.pointerEvents='auto'}); }
        function nextLevel(){ currentLevelIdx++; if(currentLevelIdx>=levelsData.length) window.location.href="index.html"; else buildLevel(currentLevelIdx); }
        function animate(){ requestAnimationFrame(animate); group.rotation.y+=0.005; renderer.render(scene,camera); }
        init();
    </script>
</body>
</html>
