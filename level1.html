
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - TP 1: Sang Pelipat Ajaib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    <div class="w-full h-[45vh] md:h-auto md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <a href="index.html" class="bg-white/90 hover:bg-white text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg transition flex items-center justify-center gap-2 backdrop-blur-sm w-max border border-slate-200">⬅️ Kembali ke Markas</a>
            <span id="view-label" class="bg-amber-500 text-white px-4 py-2 rounded-full text-xs md:text-sm font-bold shadow-lg uppercase tracking-wider">TP 1: Memuat...</span>
        </div>
    </div>
    <div class="w-full md:w-96 flex flex-col gap-4">
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-amber-500 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-white shadow-md border-2 border-white flex-shrink-0">
                    <span class="text-2xl">👩‍🏫</span>
                </div>
                <div>
                    <h2 class="font-bold text-slate-800 uppercase tracking-tight">Ibu Guru</h2>
                    <p class="text-[10px] text-amber-600 font-bold uppercase">Asisten GeoQuest</p>
                </div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm leading-relaxed font-medium italic overflow-y-auto max-h-32 transition-all">
                "Halo, Nak. Mari kita latih imajinasi lipatanmu."
            </div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4 flex flex-col">
            <h3 class="font-bold text-slate-800 text-center text-sm" id="question-text">MANA YANG AKAN MENJADI TUTUP ATAS?</h3>
            <div id="options-container" class="grid grid-cols-2 gap-3 min-h-[80px]"></div>
            <div class="flex gap-2 mt-2">
                <button id="reset-fold-btn" onclick="resetFold()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs hover:bg-slate-200 transition-all hidden">BUKA LIPATAN</button>
                <button id="next-btn" onclick="nextLevel()" class="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold text-xs hover:bg-amber-600 transition-all hidden">SOAL BERIKUTNYA</button>
            </div>
        </div>
    </div>
    <script>

        // --- SISTEM PENGIRIMAN DATA (TELEMETRI) ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzh2BuLexfDG2v_yGvYuYFK_QjRROZN6qzieW0XrGaW1q5pX9k889J4vw4ktH16Y27tmA/exec";
        
        function sendEvaluasiData(tpName, soalName, status, alatBantu = "Tanpa Alat") {
            const studentName = localStorage.getItem('geoquest_student_name') || "Anonim";
            
            const payload = {
                nama: studentName,
                tp: tpName,
                soal: soalName,
                status: status,
                alatBantu: alatBantu
            };

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors', // Penting untuk bypass blokir CORS browser
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log("Data terekam: ", payload);
            }).catch(err => {
                console.error("Gagal mengirim data:", err);
            });
        }

        let scene, camera, renderer, group;
        let pivotsToAnimate = []; 
        let currentLevelIdx = 0;
        let isCorrectAnswer = false;
        window.speechUtterances = []; 
        const levelsData = [
            {
                title: "Kubus (Pola 1-4-1)", type: "Kubus", baseColorName: "Merah Muda",
                faces: [
                    {id: 0, color: 0xec4899, w:1, h:1, hinge: null, parent: null, foldAxis: '', foldAngle: 0}, 
                    {id: 1, color: 0x22c55e, w:1, h:1, hinge: 'left', parent: 0, foldAxis: 'y', foldAngle: Math.PI/2}, 
                    {id: 2, color: 0xa855f7, w:1, h:1, hinge: 'right', parent: 0, foldAxis: 'y', foldAngle: -Math.PI/2}, 
                    {id: 3, color: 0xeab308, w:1, h:1, hinge: 'top', parent: 0, foldAxis: 'x', foldAngle: Math.PI/2}, 
                    {id: 4, color: 0x3b82f6, w:1, h:1, hinge: 'bottom', parent: 0, foldAxis: 'x', foldAngle: -Math.PI/2}, 
                    {id: 5, color: 0x06b6d4, w:1, h:1, hinge: 'bottom', parent: 4, foldAxis: 'x', foldAngle: -Math.PI/2} 
                ],
                question: "Jika bidang Merah Muda menjadi alas di bawah, warna apakah yang akan menjadi tutup atasnya?",
                options: [{text: "Sian", isCorrect: true, colorCls: "bg-cyan-500", hexName: "Sian"}, {text: "Kuning", isCorrect: false, colorCls: "bg-yellow-500", hexName: "Kuning"}]
            },
            {
                title: "Kubus (Pola 2-3-1)", type: "Kubus", baseColorName: "Abu-abu",
                faces: [
                    {id: 0, color: 0x94a3b8, w:1, h:1, hinge: null, parent: null, foldAxis: '', foldAngle: 0},
                    {id: 1, color: 0xeab308, w:1, h:1, hinge: 'left', parent: 0, foldAxis: 'y', foldAngle: Math.PI/2},
                    {id: 2, color: 0x84cc16, w:1, h:1, hinge: 'right', parent: 0, foldAxis: 'y', foldAngle: -Math.PI/2},
                    {id: 3, color: 0xf97316, w:1, h:1, hinge: 'top', parent: 0, foldAxis: 'x', foldAngle: Math.PI/2},
                    {id: 4, color: 0xef4444, w:1, h:1, hinge: 'top', parent: 3, foldAxis: 'x', foldAngle: Math.PI/2},
                    {id: 5, color: 0x0ea5e9, w:1, h:1, hinge: 'bottom', parent: 1, foldAxis: 'x', foldAngle: -Math.PI/2}
                ],
                question: "Perhatikan letaknya! Jika bidang Abu-abu adalah alasnya, warna apa penutup atasnya?",
                options: [{text: "Merah", isCorrect: true, colorCls: "bg-red-500", hexName: "Merah"}, {text: "Biru Muda", isCorrect: false, colorCls: "bg-sky-500", hexName: "Biru Muda"}]
            },
            {
                title: "Balok (Sisi Kongruen)", type: "Balok", baseColorName: "Hijau",
                faces: [
                    {id: 0, color: 0x22c55e, w:2, h:1, hinge: null, parent: null, foldAxis: '', foldAngle: 0},
                    {id: 1, color: 0xf97316, w:1, h:1, hinge: 'left', parent: 0, foldAxis: 'y', foldAngle: Math.PI/2},
                    {id: 2, color: 0xa855f7, w:1, h:1, hinge: 'right', parent: 0, foldAxis: 'y', foldAngle: -Math.PI/2},
                    {id: 3, color: 0xeab308, w:2, h:1, hinge: 'top', parent: 0, foldAxis: 'x', foldAngle: Math.PI/2},
                    {id: 4, color: 0x3b82f6, w:2, h:1, hinge: 'bottom', parent: 0, foldAxis: 'x', foldAngle: -Math.PI/2},
                    {id: 5, color: 0xec4899, w:2, h:1, hinge: 'bottom', parent: 4, foldAxis: 'x', foldAngle: -Math.PI/2}
                ],
                question: "Ini jaring-jaring BALOK! Perhatikan ukuran sisinya. Jika bidang Hijau menjadi alas, warna apa tutup atasnya?",
                options: [{text: "Merah Muda", isCorrect: true, colorCls: "bg-pink-500", hexName: "Merah Muda"}, {text: "Oranye", isCorrect: false, colorCls: "bg-orange-500", hexName: "Oranye"}]
            }
        ];
        function speak(text, callback = null) {
            window.speechSynthesis.cancel(); 
            let utterance = new SpeechSynthesisUtterance(text);
            window.speechUtterances.push(utterance); 
            utterance.lang = 'id-ID'; utterance.pitch = 1.3; utterance.rate = 0.85; 
            utterance.onend = function() { if(callback) callback(); };
            window.speechSynthesis.speak(utterance);
            document.getElementById('chat-bubble').innerText = '"' + text + '"';
        }
        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9);
            const container = document.getElementById('canvas-container');
            camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 8); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5); light.position.set(5, 10, 7); scene.add(light);
            group = new THREE.Group(); scene.add(group);
            buildLevel(currentLevelIdx); animate(); window.addEventListener('resize', onWindowResize);
        }
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight; camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        function buildLevel(idx) {
            group.clear(); pivotsToAnimate = []; let data = levelsData[idx];
            document.getElementById('view-label').innerText = "TP 1: " + data.title;
            document.getElementById('question-text').innerText = data.question;
            document.getElementById('reset-fold-btn').classList.add('hidden'); document.getElementById('next-btn').classList.add('hidden');
            let optsContainer = document.getElementById('options-container');
            optsContainer.innerHTML = ''; optsContainer.style.pointerEvents = 'auto';
            data.options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = "p-4 border-2 border-slate-200 rounded-2xl hover:border-amber-400 transition flex items-center justify-center gap-2 bg-white shadow-sm font-bold text-slate-600";
                btn.innerHTML = `<div class="w-4 h-4 rounded-full ${opt.colorCls}"></div> ${opt.text}`;
                btn.onclick = () => checkAnswer(opt.isCorrect, opt.hexName, data.type, data.baseColorName);
                optsContainer.appendChild(btn);
            });
            let objects = {}; 
            data.faces.forEach(face => {
                const geo = new THREE.PlaneGeometry(face.w, face.h);
                const mat = new THREE.MeshLambertMaterial({ color: face.color, side: THREE.DoubleSide, transparent: true, opacity: 0.95 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({color: 0x000, linewidth: 2})));
                if (face.parent === null) {
                    mesh.rotation.x = -Math.PI / 2; group.add(mesh); objects[face.id] = { mesh: mesh, data: face };
                } else {
                    let pObj = objects[face.parent]; let pivot = new THREE.Group();
                    if (face.hinge === 'left') pivot.position.set(-pObj.data.w/2, 0, 0);
                    if (face.hinge === 'right') pivot.position.set(pObj.data.w/2, 0, 0);
                    if (face.hinge === 'top') pivot.position.set(0, pObj.data.h/2, 0);
                    if (face.hinge === 'bottom') pivot.position.set(0, -pObj.data.h/2, 0);
                    pObj.mesh.add(pivot);
                    if (face.hinge === 'left') mesh.position.set(-face.w/2, 0, 0);
                    if (face.hinge === 'right') mesh.position.set(face.w/2, 0, 0);
                    if (face.hinge === 'top') mesh.position.set(0, face.h/2, 0);
                    if (face.hinge === 'bottom') mesh.position.set(0, -face.h/2, 0);
                    pivot.add(mesh); objects[face.id] = { mesh: mesh, data: face };
                    pivotsToAnimate.push({ pivot: pivot, axis: face.foldAxis, angle: face.foldAngle });
                }
            });
            group.position.set(0,0,0);
            gsap.to(camera.position, {x: 0, y: 7, z: 9, duration: 1}); camera.lookAt(0,0,0);
            if (idx === 0) { setTimeout(() => speak(data.question), 1000); } else { speak(data.question); }
        }
        function checkAnswer(correct, colorName, shapeType, baseColorName) {
            isCorrectAnswer = correct; document.getElementById('options-container').style.pointerEvents = 'none'; 
            
            // Kirim Data ke Google Sheets
            sendEvaluasiData("TP 1: Sang Pelipat Ajaib", "Jaring-jaring " + shapeType, correct ? "Benar" : "Salah");

            const introText = correct ? `Tepat sekali! Pilihan warna ${colorName} sangat akurat. Mari kita lipat jaring-jaring ini untuk membuktikannya.` : `Pilihan yang berani, Nak. Tapi mari kita buktikan bersama dengan melipatnya sekarang.`;
            speak(introText, function() {
                pivotsToAnimate.forEach((anim, i) => {
                    let delay = (i === pivotsToAnimate.length - 1) ? 0.5 : 0; 
                    if (anim.axis === 'x') gsap.to(anim.pivot.rotation, { x: anim.angle, duration: 1.5, ease: "power2.inOut", delay: delay });
                    else gsap.to(anim.pivot.rotation, { y: anim.angle, duration: 1.5, ease: "power2.inOut", delay: delay });
                });
                gsap.to(camera.position, { x: 0, y: 4, z: 10, duration: 2, onUpdate: () => camera.lookAt(0, 0.5, 0), onComplete: () => showFeedback(colorName, shapeType, baseColorName) });
            });
        }
        function showFeedback(colorName, shapeType, baseColorName) {
            document.getElementById('view-label').innerText = `Wujud 3D: ${shapeType}`;
            let feedbackText = isCorrectAnswer ? `Tuh lihat! Setelah berdiri, sisi berwarna ${colorName} tepat di atas sisi ${baseColorName}. Imajinasi ruangmu luar biasa!` : `Coba perhatikan. Ternyata yang menjadi tutup atas adalah sisi yang lain. Tekan buka lipatan untuk memahaminya lagi.`;
            speak(feedbackText, function() {
                document.getElementById('reset-fold-btn').classList.remove('hidden'); document.getElementById('next-btn').classList.remove('hidden');
            });
        }
        function resetFold() {
            document.getElementById('reset-fold-btn').classList.add('hidden'); document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('view-label').innerText = "TP 1: Membuka Lipatan...";
            pivotsToAnimate.forEach(anim => { gsap.to(anim.pivot.rotation, { x: 0, y: 0, z: 0, duration: 1.5, ease: "power2.inOut" }); });
            gsap.to(camera.position, { x: 0, y: 7, z: 9, duration: 1.5, onUpdate: () => camera.lookAt(0, 0, 0), onComplete: () => {
                document.getElementById('options-container').style.pointerEvents = 'auto'; document.getElementById('view-label').innerText = "TP 1: " + levelsData[currentLevelIdx].title;
                speak("Amati polanya sekali lagi.");
            }});
        }
        function nextLevel() {
            currentLevelIdx++;
            if (currentLevelIdx >= levelsData.length) { speak("Luar biasa! Mari kembali ke markas utama."); setTimeout(() => { window.location.href = "index.html"; }, 3000); } 
            else { buildLevel(currentLevelIdx); }
        }
        function animate() { requestAnimationFrame(animate); group.rotation.y += 0.005; renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
