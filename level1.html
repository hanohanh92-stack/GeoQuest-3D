<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest 3D - TP 1: Sang Pelipat Ajaib</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        canvas { display: block; border-radius: 1.5rem; width: 100% !important; height: 100% !important; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col md:flex-row p-4 gap-4">
    <div class="w-full h-[45vh] md:h-auto md:flex-1 relative bg-white rounded-3xl shadow-2xl overflow-hidden border-4 border-white">
        <div id="canvas-container" class="absolute inset-0"></div>
        <div class="absolute top-4 left-4 z-10 flex flex-col gap-2">
            <a href="index.html" class="bg-white/90 text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg border border-slate-200">⬅️ Kembali ke Markas</a>
            <span id="view-label" class="bg-amber-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-lg">TP 1: Jaring-jaring</span>
        </div>
    </div>
    <div class="w-full md:w-96 flex flex-col gap-4">
        <div class="glass p-6 rounded-3xl shadow-xl border-t-4 border-amber-500">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-12 h-12 bg-amber-500 rounded-full flex items-center justify-center text-white text-2xl border-2 border-white">👩‍🏫</div>
                <div><h2 class="font-bold">Ibu Guru</h2><p class="text-[10px] text-amber-600 font-bold uppercase">GeoQuest AI</p></div>
            </div>
            <div id="chat-bubble" class="text-slate-700 text-sm italic font-medium">"Mari kita asah imajinasimu dengan jaring-jaring baru!"</div>
        </div>
        <div class="bg-white p-6 rounded-3xl shadow-xl space-y-4">
            <h3 class="font-bold text-center text-xs" id="question-text">MANA YANG AKAN JADI TUTUP ATAS?</h3>
            <div id="options-container" class="grid grid-cols-2 gap-3 min-h-[80px]"></div>
            <div class="flex gap-2">
                <button id="reset-fold-btn" onclick="resetFold()" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs hidden">BUKA LIPATAN</button>
                <button id="next-btn" onclick="nextLevel()" class="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold text-xs hidden">SOAL BERIKUTNYA</button>
            </div>
        </div>
    </div>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzh2BuLexfDG2v_yGvYuYFK_QjRROZN6qzieW0XrGaW1q5pX9k889J4vw4ktH16Y27tmA/exec";
        function sendData(soal, status) {
            const nama = localStorage.getItem('geoquest_student_name') || "Anonim";
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nama, tp: "TP 1", soal, status, alatBantu: "Tanpa Alat" }) });
        }

        let scene, camera, renderer, group, pivotsToAnimate = [], currentTargetColor = "";
        const palette = [0xec4899, 0x22c55e, 0xa855f7, 0xeab308, 0x3b82f6, 0x06b6d4, 0xef4444, 0x0ea5e9];
        const colorNames = { 0xec4899:"Merah Muda", 0x22c55e:"Hijau", 0xa855f7:"Ungu", 0xeab308:"Kuning", 0x3b82f6:"Biru", 0x06b6d4:"Sian", 0xef4444:"Merah", 0x0ea5e9:"Langit" };

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9);
            camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000); camera.position.set(0, 6, 8); camera.lookAt(0,0,0);
            renderer = new THREE.WebGLRenderer({antialias:true}); renderer.setSize(500,500); document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8)); let l = new THREE.DirectionalLight(0xffffff, 0.5); l.position.set(5,10,7); scene.add(l);
            group = new THREE.Group(); scene.add(group); buildLevel(); animate();
            window.addEventListener('resize', onResize); onResize();
        }
        function onResize() { let box = document.getElementById('canvas-container'); renderer.setSize(box.clientWidth, box.clientHeight); camera.aspect = box.clientWidth/box.clientHeight; camera.updateProjectionMatrix(); }
        
        function buildLevel() {
            group.clear(); pivotsToAnimate = []; 
            document.getElementById('reset-fold-btn').classList.add('hidden'); document.getElementById('next-btn').classList.add('hidden');
            let colors = [...palette].sort(()=>Math.random()-0.5).slice(0,6);
            
            // Pola 1-4-1 (Randomized orientation)
            let faces = [
                {id:0, c:colors[0], w:1, h:1, hinge:null, p:null},
                {id:1, c:colors[1], w:1, h:1, hinge:'left', p:0, axis:'y', angle: Math.PI/2},
                {id:2, c:colors[2], w:1, h:1, hinge:'right', p:0, axis:'y', angle: -Math.PI/2},
                {id:3, c:colors[3], w:1, h:1, hinge:'top', p:0, axis:'x', angle: Math.PI/2},
                {id:4, c:colors[4], w:1, h:1, hinge:'bottom', p:0, axis:'x', angle: -Math.PI/2},
                {id:5, c:colors[5], w:1, h:1, hinge:'bottom', p:4, axis:'x', angle: -Math.PI/2}
            ];

            let baseFace = faces[0]; let targetFace = faces[5]; currentTargetColor = colorNames[targetFace.c];
            document.getElementById('question-text').innerText = `JIKA BIDANG ${colorNames[baseFace.c].toUpperCase()} JADI ALAS, WARNA APA TUTUP ATASNYA?`;
            
            let opts = [targetFace.c, faces[3].c].sort(()=>Math.random()-0.5);
            let container = document.getElementById('options-container'); container.innerHTML = '';
            opts.forEach(c => {
                let b = document.createElement('button'); b.className = "p-4 border-2 rounded-2xl bg-white font-bold flex items-center gap-2";
                b.innerHTML = `<div class='w-4 h-4 rounded-full' style='background-color:#${c.toString(16)}'></div> ${colorNames[c]}`;
                b.onclick = () => check(c === targetFace.c, colorNames[c], colorNames[baseFace.c]); container.appendChild(b);
            });

            let objs = {}; faces.forEach(f => {
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(f.w, f.h), new THREE.MeshLambertMaterial({color:f.c, side:THREE.DoubleSide, transparent:true, opacity:0.95}));
                mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(mesh.geometry), new THREE.LineBasicMaterial({color:0x000})));
                if(f.p === null) { mesh.rotation.x = -Math.PI/2; group.add(mesh); objs[f.id]={mesh, data:f}; }
                else {
                    let p = objs[f.p]; let piv = new THREE.Group();
                    if(f.hinge==='left') piv.position.set(-0.5,0,0); if(f.hinge==='right') piv.position.set(0.5,0,0);
                    if(f.hinge==='top') piv.position.set(0,0.5,0); if(f.hinge==='bottom') piv.position.set(0,-0.5,0);
                    p.mesh.add(piv); mesh.position.set(f.hinge==='left'?-0.5:f.hinge==='right'?0.5:0, f.hinge==='top'?0.5:f.hinge==='bottom'?-0.5:0, 0);
                    piv.add(mesh); objs[f.id]={mesh, data:f}; pivotsToAnimate.push({piv, axis:f.axis, angle:f.angle});
                }
            });
            gsap.to(camera.position, {y:7, z:9, duration:1, onUpdate:()=>camera.lookAt(0,0,0)});
        }

        function check(win, cName, bName) {
            document.getElementById('options-container').style.pointerEvents='none';
            sendData("Pola 1-4-1", win?"Benar":"Salah");
            let txt = win ? "Tepat sekali! Mari kita buktikan." : "Kurang tepat, tapi mari kita lihat hasilnya.";
            speak(txt, () => {
                pivotsToAnimate.forEach((a,i) => gsap.to(a.piv.rotation, {[a.axis]:a.angle, duration:1.5, delay:i*0.1}));
                gsap.to(camera.position, {y:4, z:10, duration:2, onUpdate:()=>camera.lookAt(0,0.5,0), onComplete:()=> {
                    speak(win ? `Sisi ${cName} benar-benar menutup di atas ${bName}!` : `Ternyata sisi ${currentTargetColor} lah penutupnya.`);
                    document.getElementById('reset-fold-btn').classList.remove('hidden'); document.getElementById('next-btn').classList.remove('hidden');
                }});
            });
        }
        function resetFold() { buildLevel(); document.getElementById('options-container').style.pointerEvents='auto'; }
        function nextLevel() { buildLevel(); document.getElementById('options-container').style.pointerEvents='auto'; }
        function animate() { requestAnimationFrame(animate); group.rotation.y += 0.005; renderer.render(scene, camera); }
        init();
    </script>
</body>
</html>
